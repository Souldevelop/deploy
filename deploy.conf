# deploy_claude.sh 自动化部署配置
#
# 本地用法:
#   sudo bash deploy_claude.sh --config deploy.conf
#
# 远程用法（将脚本和配置上传到 Web 服务器或 Git）:
#   # 方式一: 先下载配置再安装（推荐）
#   curl -fsSL https://raw.githubusercontent.com/Souldevelop/deploy/master/deploy.conf -o /tmp/deploy.conf
#   curl -fsSL https://raw.githubusercontent.com/Souldevelop/deploy/master/deploy_claude.sh | bash -s -- --config /tmp/deploy.conf
#
#   # 方式二: 进程替换（一行命令，无需临时文件）
#   curl -fsSL https://raw.githubusercontent.com/Souldevelop/deploy/master/deploy_claude.sh | bash -s -- \
#     --config <(curl -fsSL https://raw.githubusercontent.com/Souldevelop/deploy/master/deploy.conf)

# APT 镜像源（必填）
APT_MIRROR=mirrors.aliyun.com

# npm 镜像源（必填）
NPM_MIRROR=https://registry.npmmirror.com/

# API 密钥（选填——不填则在安装时提示输入，两种方式都支持）
# ANTHROPIC_API_KEY=sk-ant-替换成你的密钥

# API 地址（选填，默认 https://api.anthropic.com）
ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic

# 默认模型（选填，默认 claude-sonnet-4-6-20250224）
ANTHROPIC_MODEL=DeepSeek-V4-Flash

# CC-Switch MSI 下载地址（选填，默认从部署仓库拉取）
# 切换到 Gitee 等镜像时修改此项
# CC_SWITCH_URL=https://gitee.com/reverseking/deploy/raw/master/vendor/CC-Switch-Windows.msi
